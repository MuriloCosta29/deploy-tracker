# name — what to call the pipeline
# on — when to run (on push, on pull request, etc.)
# jobs — what to do (each job has steps)

name: CI 

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: deploy_tracker
          POSTGRES_PASSWORD: password 
          POSTGRES_DB: deploy_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U deploy_tracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code 
        uses: actions/checkout@v5

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: python -m ruff check .

      - name: Run tests
        run: pytest

      - name: Build Docker Image
        run: docker build -t deploy-tracker .

