services:

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: deploy_tracker
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deploy_tracker
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - 8000:8000
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    depends_on:
      - redis
    command: celery -A celery_app worker

  celery_beat:
    build: .
    depends_on:
      - redis
    command: celery -A celery_app beat

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    depends_on:
      - app
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  nginx:
    image: nginx
    ports:
      - 80:80
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  grafana_data:
  postgres_data:
